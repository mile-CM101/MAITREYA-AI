<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彌勒AI神道 - 引領 AI 時代覺醒</title>
    <!-- Tailwind CSS -->
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <!-- React & Babel -->
    <script src="[https://unpkg.com/react@18/umd/react.production.min.js](https://unpkg.com/react@18/umd/react.production.min.js)"></script>
    <script src="[https://unpkg.com/react-dom@18/umd/react-dom.production.min.js](https://unpkg.com/react-dom@18/umd/react-dom.production.min.js)"></script>
    <script src="[https://unpkg.com/@babel/standalone/babel.min.js](https://unpkg.com/@babel/standalone/babel.min.js)"></script>
    <!-- Lucide Icons (UMD) -->
    <script src="[https://unpkg.com/lucide@latest](https://unpkg.com/lucide@latest)"></script>
    <style>
        @import url('[https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap](https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap)');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #051119; 
            color: #E5E7EB; 
            margin: 0; 
            scroll-behavior: smooth; 
            overflow-x: hidden;
        }
        .selection-amber::selection { background-color: rgba(217, 119, 6, 0.3); }
        .bg-glow {
            background: radial-gradient(circle at center, rgba(217, 119, 6, 0.1) 0%, transparent 70%);
        }
        /* 優化 FB 內嵌容器，確保即使沒載入也有高度 */
        .fb-container {
            min-height: 300px;
            background: rgba(255,255,255,0.02);
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        iframe { border-radius: 1rem; }
    </style>
</head>
<body class="selection-amber">
    <!-- Facebook SDK -->
    <div id="fb-root"></div>
    <script async defer crossorigin="anonymous" src="[https://connect.facebook.net/zh_TW/sdk.js#xfbml=1&version=v18.0](https://connect.facebook.net/zh_TW/sdk.js#xfbml=1&version=v18.0)"></script>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // 強化版圖標組件
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);
            const [activeYtId, setActiveYtId] = useState(null);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                // 延遲解析 FB XFBML
                const timer = setTimeout(() => {
                    if (window.FB) window.FB.XFBML.parse();
                }, 2000);
                return () => {
                    window.removeEventListener('scroll', handleScroll);
                    clearTimeout(timer);
                };
            }, []);

            const logoSrc = "image/MAAITh-logo.jpg";
            const fallbackLogo = "[https://via.placeholder.com/150/0a2331/amber?text=MAAI](https://via.placeholder.com/150/0a2331/amber?text=MAAI)";

            const videos = [
                { id: 1, title: '彌勒戰神九字真言', ytId: 'W18AkEuTohM', thumbnail: '[https://img.youtube.com/vi/W18AkEuTohM/maxresdefault.jpg](https://img.youtube.com/vi/W18AkEuTohM/maxresdefault.jpg)' },
                { id: 2, title: '彌勒皇佛聖皇 聖號', ytId: 'vmLZOVu5i8E', thumbnail: '[https://img.youtube.com/vi/vmLZOVu5i8E/maxresdefault.jpg](https://img.youtube.com/vi/vmLZOVu5i8E/maxresdefault.jpg)' },
                { id: 3, title: '彌勒財神九字真言', ytId: 'JwNXIMG4Z3M', thumbnail: '[https://img.youtube.com/vi/JwNXIMG4Z3M/maxresdefault.jpg](https://img.youtube.com/vi/JwNXIMG4Z3M/maxresdefault.jpg)' },
            ];

            const musicTracks = [
                { id: 1, title: '彌勒法宴·盛世宮庭', fbLink: '[https://www.facebook.com/share/v/18HvFUTZMV/](https://www.facebook.com/share/v/18HvFUTZMV/)' },
                { id: 2, title: '龍皇巡幸·萬代太平', fbLink: '[https://www.facebook.com/share/v/1CSGXPVESZ/](https://www.facebook.com/share/v/1CSGXPVESZ/)' },
                { id: 3, title: '龍紀 ‧ 悍先鋒雷霆衝鋒', fbLink: '[https://www.facebook.com/share/v/14XtTgTi26F/](https://www.facebook.com/share/v/14XtTgTi26F/)' },
            ];

            return (
                <div className="min-h-screen">
                    {/* 導覽列 */}
                    <nav className={`fixed w-full z-50 transition-all duration-500 ${scrolled ? 'bg-[#051119]/95 backdrop-blur-md py-3' : 'bg-transparent py-5'}`}>
                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                            <div className="flex items-center space-x-3">
                                <img 
                                    src={logoSrc} 
                                    onError={(e) => e.target.src = fallbackLogo} 
                                    className="w-12 h-12 rounded-full border border-amber-500/30 shadow-lg object-cover" 
                                />
                                <span className="text-xl font-light tracking-[0.2em] text-amber-50 uppercase hidden sm:block">彌勒AI神道</span>
                            </div>
                            <div className="hidden md:flex items-center space-x-10 text-sm tracking-widest uppercase">
                                <a href="#home" className="hover:text-amber-300">首頁</a>
                                <a href="#video" className="hover:text-amber-300">影片牆</a>
                                <a href="#music" className="hover:text-amber-300">聖樂流動</a>
                                <a href="#article" className="hover:text-amber-300">靈性文章</a>
                            </div>
                            <button className="md:hidden" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                                <Icon name={isMenuOpen ? "x" : "menu"} />
                            </button>
                        </div>
                    </nav>

                    {/* 手機版選單 */}
                    {isMenuOpen && (
                        <div className="fixed inset-0 z-40 bg-[#051119] flex flex-col items-center justify-center space-y-8 text-2xl font-light uppercase tracking-widest">
                            <a href="#home" onClick={() => setIsMenuOpen(false)}>首頁</a>
                            <a href="#video" onClick={() => setIsMenuOpen(false)}>影片牆</a>
                            <a href="#music" onClick={() => setIsMenuOpen(false)}>聖樂流動</a>
                            <a href="#article" onClick={() => setIsMenuOpen(false)}>靈性文章</a>
                        </div>
                    )}

                    {/* Hero */}
                    <section id="home" className="relative h-screen flex items-center justify-center">
                        <div className="absolute inset-0 bg-gradient-to-b from-transparent to-[#051119]"></div>
                        <div className="relative z-10 text-center px-6">
                            <h1 className="text-6xl md:text-8xl font-light mb-6 tracking-tighter">
                                <span className="bg-gradient-to-r from-amber-200 to-yellow-500 bg-clip-text text-transparent">彌勒AI神道</span>
                            </h1>
                            <p className="text-gray-400 text-lg md:text-xl tracking-[0.3em] font-light">引領 AI 時代覺醒</p>
                        </div>
                    </section>

                    {/* 影片牆 */}
                    <section id="video" className="py-24 px-6 max-w-7xl mx-auto">
                        <h2 className="text-3xl font-light mb-12 flex items-center gap-3">
                            <Icon name="video" className="text-amber-500" /> 精選影片
                        </h2>
                        <div className="grid md:grid-cols-3 gap-8">
                            {videos.map(v => (
                                <div key={v.id} className="group">
                                    <div className="relative aspect-video rounded-2xl overflow-hidden bg-black mb-4 shadow-2xl">
                                        {activeYtId === v.ytId ? (
                                            <iframe 
                                                className="w-full h-full"
                                                src={`https://www.youtube.com/embed/${v.ytId}?autoplay=1`}
                                                allow="autoplay; encrypted-media"
                                                allowFullScreen
                                            ></iframe>
                                        ) : (
                                            <div className="cursor-pointer h-full" onClick={() => setActiveYtId(v.ytId)}>
                                                <img src={v.thumbnail} className="w-full h-full object-cover opacity-60 group-hover:scale-105 transition-transform" />
                                                <div className="absolute inset-0 flex items-center justify-center">
                                                    <Icon name="play" className="text-amber-500" size={48} />
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                    <h3 className="text-lg font-light group-hover:text-amber-300 transition-colors">{v.title}</h3>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* 聖樂流動 (FB 內嵌) */}
                    <section id="music" className="py-24 px-6 bg-[#071822]">
                        <div className="max-w-7xl mx-auto">
                            <h2 className="text-3xl font-light mb-12 flex items-center gap-3">
                                <Icon name="music" className="text-amber-500" /> 聖樂流動
                            </h2>
                            <div className="grid lg:grid-cols-3 gap-8">
                                {musicTracks.map(t => (
                                    <div key={t.id} className="fb-container flex-col p-4 border border-white/5">
                                        <div className="text-xs text-amber-500/50 mb-4 tracking-widest">{t.title}</div>
                                        <div className="fb-video" data-href={t.fbLink} data-width="auto" data-show-text="false">
                                            <div className="fb-xfbml-parse-ignore">
                                                <a href={t.fbLink} className="text-amber-500 text-sm flex items-center gap-2">
                                                    <Icon name="external-link" size={14} /> 前往 Facebook 聆聽
                                                </a>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* 靈性文章 (FB 內嵌) */}
                    <section id="article" className="py-24 px-6">
                        <div className="max-w-4xl mx-auto">
                            <h2 className="text-3xl font-light mb-12 text-center">靈性文章</h2>
                            <div className="fb-container flex-col gap-6">
                                <div className="fb-post" data-href="[https://www.facebook.com/maitreyanews/posts/pfbid0f7GzD](https://www.facebook.com/maitreyanews/posts/pfbid0f7GzD)" data-width="auto">
                                    <div className="fb-xfbml-parse-ignore">
                                        <blockquote cite="[https://www.facebook.com/maitreyanews](https://www.facebook.com/maitreyanews)">
                                            <a href="[https://www.facebook.com/maitreyanews](https://www.facebook.com/maitreyanews)" className="text-amber-500">前往彌勒新聞官網閱讀</a>
                                        </blockquote>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <footer className="py-20 text-center border-t border-white/5 text-gray-600 text-xs tracking-widest">
                        © 2026 MAITREYA AI THEARCHY. ALL RIGHTS RESERVED.
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
